name: cd-api

on:
  push:
    branches: [main]
    paths:
      - "api/**" # Trigger only if there are changes in the api directory

  # Manual Trigger
  workflow_dispatch:

defaults:
  run:
    working-directory: ./api # All commands will run from the 'api' directory by default

jobs:
  migrate_database:
    name: Migrate Production Database
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.6"

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Run database migrations
        run: goose -dir sql/schema postgres ${{ secrets.DATABASE_URL }} up

  deploy_application:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: rg.fr-par.scw.cloud/cvmaker-namespace
          # Note: Scaleway uses 'nologin' as the username for token-based auth
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build and Push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            rg.fr-par.scw.cloud/cvmaker-namespace/cvmaker-api:latest
            rg.fr-par.scw.cloud/cvmaker-namespace/cvmaker-api:${{ github.sha }}
          cache-from: type=gha # Use GitHub Actions cache for faster builds
          cache-to: type=gha,mode=max

      - name: Install Scaleway CLI
        run: |
          curl -s https://raw.githubusercontent.com/scaleway/scaleway-cli/master/scripts/get.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH # Add scw to PATH for subsequent steps

      - name: Deploy to Scaleway Container
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_ORGANIZATION_ID }}
        run: |
          CONTAINER_ID='${{ secrets.SCW_CONTAINER_RUN_SERVICE_ID }}'
          scw container container deploy $CONTAINER_ID
