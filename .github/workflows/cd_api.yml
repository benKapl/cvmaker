name: cd-api

on:
  pull_request:
    branches: [main]
    paths:
      - "api/**" # Trigger only if there are changes in the api directory

  # Manual Trigger
  workflow_dispatch:

defaults:
  run:
    working-directory: ./api # All commands will run from the 'api' directory by default

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: rg.fr-par.scw.cloud/cvmaker-namespace
          # Note: Scaleway uses 'nologin' as the username for token-based auth
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}
          
      - name: Build and Push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true 
          tags: |
            rg.fr-par.scw.cloud/cvmaker-namespace/cvmaker-api:latest
            rg.fr-par.scw.cloud/cvmaker-namespace/cvmaker-api:${{ github.sha }}
          cache-from: type=gha # Use GitHub Actions cache for faster builds
          cache-to: type=gha,mode=max

      - name: Debug Secrets
        env:
          SCW_ACCESS_KEY_VAR: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY_VAR: ${{ secrets.SCW_SECRET_KEY }}
          SCW_ORGANIZATION_ID_VAR: ${{ secrets.SCW_ORGANIZATION_ID }}
          SCW_PROJECT_ID_VAR: ${{ secrets.SCW_PROJECT_ID }}
        run: |
          echo "SCW_ACCESS_KEY_VAR: ${SCW_ACCESS_KEY_VAR}"
          echo "SCW_SECRET_KEY_VAR: ${SCW_SECRET_KEY_VAR}"
          echo "SCW_ORGANIZATION_ID_VAR: ${SCW_ORGANIZATION_ID_VAR}"
          echo "SCW_PROJECT_ID_VAR: ${SCW_PROJECT_ID_VAR}"

      - name: Install and Configure Scaleway CLI
        env:
          SCW_ACCESS_KEY_VAR: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY_VAR: ${{ secrets.SCW_SECRET_KEY }}
          SCW_ORGANIZATION_ID_VAR: ${{ secrets.SCW_ORGANIZATION_ID }}
          SCW_PROJECT_ID_VAR: ${{ secrets.SCW_PROJECT_ID }}
          DEFAULT_REGION_VAR: 'fr-par'
        run: |
          curl -s https://raw.githubusercontent.com/scaleway/scaleway-cli/master/scripts/get.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH # Add scw to PATH for subsequent steps
          scw config set access-key "$SCW_ACCESS_KEY_VAR"
          scw config set secret-key "$SCW_SECRET_KEY_VAR"
          scw config set default-organization-id "$SCW_ORGANIZATION_ID_VAR"
          scw config set default-project-id "$SCW_PROJECT_ID_VAR"
          scw config set default-region "$DEFAULT_REGION_VAR"

      - name: Deploy to Scaleway Container
        run: |
          CONTAINER_ID='${{ secrets.SCW_CONTAINER_RUN_SERVICE_ID }}'
          echo "Deploying image to container ID: $CONTAINER_ID"
          scw container-run deploy $CONTAINER_ID image=rg.fr-par.scw.cloud/cvmaker-namespace/cvmaker-api:${{ github.sha }}
