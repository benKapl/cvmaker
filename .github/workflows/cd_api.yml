name: cd-api

on:
  pull_request:
    branches: [main]
    paths:
      - "api/**" # Trigger only if there are changes in the api directory

  # Manual Trigger
  workflow_dispatch:

defaults:
  run:
    working-directory: ./api # All commands will run from the 'api' directory by default

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: rg.fr-par.scw.cloud/cvmaker-namespace
          # Note: Scaleway uses 'nologin' as the username for token-based auth
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}
          
      - name: Build and Push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true 
          tags: |
            rg.fr-par.scw.cloud/cvmaker-namespace/cvmaker-api:latest
            rg.fr-par.scw.cloud/cvmaker-namespace/cvmaker-api:${{ github.sha }}
          cache-from: type=gha # Use GitHub Actions cache for faster builds
          cache-to: type=gha,mode=max

      - name: Install and Configure Scaleway CLI
        # Removed the env block for the secrets here.
        # We will directly export them within the run block.
        # DEFAULT_REGION_ENV can stay in env as it's not a sensitive secret
        env:
          DEFAULT_REGION_ENV: 'fr-par'
        run: |
          set -e # Exit immediately if a command exits with a non-zero status

          # Install Scaleway CLI
          curl -s https://raw.githubusercontent.com/scaleway/scaleway-cli/master/scripts/get.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH # Add scw to PATH for subsequent steps

          # Directly export secrets for this run command.
          # This forces immediate resolution of the secret values.
          # We use a temporary variable name for the shell to avoid conflicts
          # and then use printf %q for robust quoting.
          SCW_ACCESS_KEY_VAL=$(printf %q "${{ secrets.SCW_ACCESS_KEY }}")
          SCW_SECRET_KEY_VAL=$(printf %q "${{ secrets.SCW_SECRET_KEY }}")
          SCW_ORGANIZATION_ID_VAL=$(printf %q "${{ secrets.SCW_ORGANIZATION_ID }}")
          SCW_PROJECT_ID_VAL=$(printf %q "${{ secrets.SCW_PROJECT_ID }}")

          # DEBUG: Print the values explicitly using printf %q to see what the shell sees
          # This should now hopefully show the actual values
          echo "DEBUG: SCW_ACCESS_KEY_VAL (quoted): $SCW_ACCESS_KEY_VAL"
          echo "DEBUG: SCW_SECRET_KEY_VAL (quoted): $SCW_SECRET_KEY_VAL"
          echo "DEBUG: SCW_ORGANIZATION_ID_VAL (quoted): $SCW_ORGANIZATION_ID_VAL"
          echo "DEBUG: SCW_PROJECT_ID_VAL (quoted): $SCW_PROJECT_ID_VAL"

          # Configure the Scaleway CLI using the exported values
          scw config set access-key "$SCW_ACCESS_KEY_VAL"
          scw config set secret-key "$SCW_SECRET_KEY_VAL"
          scw config set default-organization-id "$SCW_ORGANIZATION_ID_VAL"
          scw config set default-project-id "$SCW_PROJECT_ID_VAL"
          scw config set default-region "$DEFAULT_REGION_ENV"

      - name: Deploy to Scaleway Container
        run: |
          CONTAINER_ID='${{ secrets.SCW_CONTAINER_RUN_SERVICE_ID }}'
          echo "Deploying image to container ID: $CONTAINER_ID"
          scw container-run deploy $CONTAINER_ID image=rg.fr-par.scw.cloud/cvmaker-namespace/cvmaker-api:${{ github.sha }}
