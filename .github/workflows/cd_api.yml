name: cd-api

on:
  pull_request:
    branches: [main]
    paths:
      - "api/**" # Trigger only if there are changes in the api directory

  # Manual Trigger
  workflow_dispatch:

defaults:
  run:
    working-directory: ./api # All commands will run from the 'api' directory by default

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: rg.fr-par.scw.cloud/cvmaker-namespace
          # Note: Scaleway uses 'nologin' as the username for token-based auth
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}
          
      - name: Build and Push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true 
          tags: |
            rg.fr-par.scw.cloud/cvmaker-namespace/cvmaker-api:latest
            rg.fr-par.scw.cloud/cvmaker-namespace/cvmaker-api:${{ github.sha }}
          cache-from: type=gha # Use GitHub Actions cache for faster builds
          cache-to: type=gha,mode=max

      - name: Install and Configure Scaleway CLI
        env:
          # Keep the environment variables at the step level for GitHub Actions to inject them
          SCW_ACCESS_KEY_ENV: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY_ENV: ${{ secrets.SCW_SECRET_KEY }}
          SCW_ORGANIZATION_ID_ENV: ${{ secrets.SCW_ORGANIZATION_ID }}
          SCW_PROJECT_ID_ENV: ${{ secrets.SCW_PROJECT_ID }}
          DEFAULT_REGION_ENV: 'fr-par'
        run: |
          set -e # Exit immediately if a command exits with a non-zero status

          # Install Scaleway CLI
          curl -s https://raw.githubusercontent.com/scaleway/scaleway-cli/master/scripts/get.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH # Add scw to PATH for subsequent steps

          # Debug: Print the values explicitly using printf %q to see what the shell sees
          # This should show the actual value, properly quoted, if the secret is resolved
          echo "DEBUG: SCW_ACCESS_KEY_ENV (quoted): $(printf %q "$SCW_ACCESS_KEY_ENV")"
          echo "DEBUG: SCW_SECRET_KEY_ENV (quoted): $(printf %q "$SCW_SECRET_KEY_ENV")"
          echo "DEBUG: SCW_ORGANIZATION_ID_ENV (quoted): $(printf %q "$SCW_ORGANIZATION_ID_ENV")"
          echo "DEBUG: SCW_PROJECT_ID_ENV (quoted): $(printf %q "$SCW_PROJECT_ID_ENV")"

          # Configure the Scaleway CLI using the environment variables and printf %q
          # This ensures that the secret values are passed as literal strings,
          # regardless of their content (spaces, special characters, etc.)
          scw config set access-key "$(printf %q "$SCW_ACCESS_KEY_ENV")"
          scw config set secret-key "$(printf %q "$SCW_SECRET_KEY_ENV")"
          scw config set default-organization-id "$(printf %q "$SCW_ORGANIZATION_ID_ENV")"
          scw config set default-project-id "$(printf %q "$SCW_PROJECT_ID_ENV")"
          scw config set default-region "$(printf %q "$DEFAULT_REGION_ENV")"

      - name: Deploy to Scaleway Container
        run: |
          CONTAINER_ID='${{ secrets.SCW_CONTAINER_RUN_SERVICE_ID }}'
          echo "Deploying image to container ID: $CONTAINER_ID"
          scw container-run deploy $CONTAINER_ID image=rg.fr-par.scw.cloud/cvmaker-namespace/cvmaker-api:${{ github.sha }}
